<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analyzer</title>
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #202020;
            color: #ffffff;
        }
        .navbar {
            background-color: #a200ff;
            color: #ffffff;
        }
        .link-light {
            color: #ffffff;
        }
        .form-control {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #a200ff;
            height: 350px; /* Increase the height */
            width: 40%; /* Decrease the width */
            margin: 0 auto;
            text-align: center; /* Center text horizontally */
            padding-top: 10px; /* Add padding to start writing from the top */
            resize: none; /* Disable resizing */
        }
        .form-control::placeholder {
            color: #bbbbbb;
            text-align: center; /* Center placeholder text horizontally */
        }
        .btn-violet {
            color: #ffffff;
            background-color: #7022b9;
            border-color: #7022b9;
        }
        .btn-violet:hover {
            color: #ffffff;
            background-color: #161676;
            border-color: #161676;
        }
        .switch-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px; /* Spacing between switches */
            margin-top: 10px;
        }
        .form-check-label {
            margin-left: 0rem;
        }
        .checkbox-container {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .form-check-input {
            position: relative;
            margin: 0;
            cursor: pointer;
            width: 1.2rem;
            height: 1.2rem;
        }
        .form-check-input:checked {
            background-color: #ff0000;
            border-color: #575757;
        }
        .form-check-label {
            margin-left: 0.5rem;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <a class="navbar-brand link-light" href="#"><h5>Django Text Analyzer</h5></a>
        <div class="ml-auto">
            <a class="btn btn-light" href="https://legendslegecy.pythonanywhere.com">About Us</a>
            <a class="btn btn-light" href="/contact-us">Contact Us</a>
        </div>
    </nav>
    
    <br>
    <form action="/analyzed" method="post">  {% csrf_token %}
        <div class="container">
            <textarea class="form-control" type="text" name="text" id="textInput" placeholder="Enter text here..."></textarea>
        </div>
        <br>
        <div class="checkbox-container">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="uppercase" name="uppercase">
                <label class="form-check-label" for="uppercase">UPPERCASE</label>
            </div>
        </div>
        <div class="checkbox-container">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="lowercase" name="lowercase">
                <label class="form-check-label" for="lowercase">lowercase</label>
            </div>
        </div>
        <div class="checkbox-container">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="capitalize" name="capitalize">
                <label class="form-check-label" for="capitalize">Capitalize case</label>
            </div>
        </div>
        <div class="checkbox-container">
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="title" name="title">
                <label class="form-check-label" for="title">Title Case</label>
            </div>
        </div>
        <br>
        <div class="d-flex justify-content-center mt-3">
            <button type="submit" class="btn btn-violet">Analyze</button>
        </div>
    </form>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.11.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>
</html>
